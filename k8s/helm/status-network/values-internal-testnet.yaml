# Internal Testnet-specific values for status-network
# This is the first gasless ETH layer 2 rollup
# Use with: helm install -f values.yaml -f values-internal-testnet.yaml

# Global settings
global:
  namespace: status-network-internal-testnet

# Image overrides for internal testnet
images:
  rlnProver: 720430261111.dkr.ecr.us-east-1.amazonaws.com/status-network-rln-prover:v1.1.0
  postgres: 720430261111.dkr.ecr.us-east-1.amazonaws.com/status-network-postgres:v1.0.1

# Network configuration for internal testnet
network:
  l1ChainId: 560048
  l2ChainId: 59141
  forkOffsetSeconds: 180
  # Use Hoodi public testnet as L1
  l1Network: "hoodi"
  # L1 RPC endpoint, signer keys, and other secrets are provided via
  # a separate values-secrets.yaml file (not committed to git).
  # See values-secrets.yaml.example for the template.
  # Contract addresses (L1 rollup redeployed 2026-02-26 with correct genesis timestamp)
  contracts:
    l1Rollup: "0x2f4EF244C53E249bcF3A7188557cB9F94e1E5340"
    l2MessageService: "0x37329AFc217D487d1db339F8EfEE8C4eEA8C1648"

# RLN Configuration - Enabled for gasless transactions
rln:
  enabled: true
  contractAddress: "0x5C95Bcd50E6D1B4E3CDC478484C9030Ff0a7D493"
  minMembershipBalance: "1000000000000000000"
  epochMode: "TEST"
  timeoutMs: 10000
  proofWaitTimeoutMs: 10000
  # Transactions above 12 gwei bypass RLN proof generation (premium transactions)
  premiumGasThresholdGwei: 12
  premiumGasMultiplier: "1.5"
  gasless:
    enabled: true
    allowZeroGasEstimation: true

# L1 disabled - using external Hoodi RPC instead of running own nodes
l1:
  enabled: false

l2:
  postgres:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    storage:
      size: 20Gi

  rlnProver:
    enabled: true
    # Production mode - connects to real smart contracts
    productionMode: true
    logLevel: debug
    # Contract addresses (deployed on fresh L2 chain 2026-02-21)
    karmaContract: "0xe537D669CA013d86EBeF1D64e40fC74CADC91987"
    rlnContract: "0x5C95Bcd50E6D1B4E3CDC478484C9030Ff0a7D493"
    tiersContract: "0x729409FAD88CafdA895E41f9ED00Ef4094F8d130"
    # Prover private key provided via values-secrets.yaml
    registrationMin: 1
    resources:
      requests:
        cpu: 1000m
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    # Epoch configuration - shorter epochs for testing
    epochDurationSecs: 300
    epochSliceSecs: 60

  sequencer:
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    storage:
      size: 50Gi

  maru:
    enabled: true
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

  l2NodeBesu:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    storage:
      size: 20Gi

  l2NodeBesuFollower:
    enabled: true
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
    storage:
      size: 20Gi

  tracesNode:
    javaOpts: "-Xmx3g"
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        cpu: "2"
        memory: 4Gi
    storage:
      size: 50Gi

  zkbesuShomei:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    storage:
      size: 20Gi

  shomei:
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
    storage:
      size: 20Gi

  shomeiFrontend:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  coordinator:
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi

  # Disable web3signer - no validator keys for internal testnet
  web3signer:
    enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  postman:
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

  # Disable transaction-exclusion-api - has startup issues
  txExclusionApi:
    enabled: false
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

# Dummy prover sidecar - generates fake proofs for dev/test
prover:
  enabled: true

# Observability disabled for testnet
observability:
  enabled: false

# Services
services:
  l2RpcLoadBalancer:
    enabled: true
  l1RpcLoadBalancer:
    enabled: false

# Network policies disabled
networkPolicies:
  enabled: false

# PDBs disabled
podDisruptionBudgets:
  enabled: false
