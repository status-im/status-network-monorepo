{{- if and .Values.l2.enabled .Values.l2.shomei.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shomei
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "shomei") | nindent 4 }}
spec:
  replicas: {{ .Values.l2.shomei.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "status-network.componentSelectorLabels" (list . "shomei") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "status-network.componentSelectorLabels" (list . "shomei") | nindent 8 }}
    spec:
      initContainers:
        - name: fix-permissions
          image: {{ .Values.images.busybox }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Fixing data directory permissions..."
              chown -R 1000:1000 /data/shomei
              chmod -R 755 /data/shomei
              echo "Permissions fixed"
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: shomei-data
              mountPath: /data/shomei
        - name: wait-for-zkbesu
          image: {{ .Values.images.busybox }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for zkbesu-shomei..."
              until nc -z zkbesu-shomei {{ .Values.l2.zkbesuShomei.ports.http }}; do
                echo "zkbesu-shomei not ready, waiting..."
                sleep 2
              done
              echo "zkbesu-shomei is ready"
      containers:
        - name: shomei
          image: {{ .Values.images.shomei }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - /opt/shomei/bin/shomei
            - --besu-rpc-http-host=zkbesu-shomei
            - --besu-rpc-http-port={{ .Values.l2.zkbesuShomei.ports.http }}
            - --rpc-http-host=0.0.0.0
            - --rpc-http-host-allow-list=*
            - --rpc-http-port={{ .Values.l2.shomei.port }}
            - --min-confirmations-before-importing=0
            - --trace-start-block-number=0
            - --data-path=/data/shomei
          ports:
            - name: http
              containerPort: {{ .Values.l2.shomei.port }}
              protocol: TCP
          volumeMounts:
            - name: shomei-config
              mountPath: /config/log4j.xml
              subPath: log4j.xml
            - name: shomei-data
              mountPath: /data/shomei
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.l2.shomei.resources | nindent 12 }}
      volumes:
        - name: shomei-config
          configMap:
            name: shomei-config
        - name: shomei-data
          persistentVolumeClaim:
            claimName: shomei-data
      {{- include "status-network.nodeSelector" . | nindent 6 }}
      {{- include "status-network.tolerations" . | nindent 6 }}
      {{- include "status-network.affinity" . | nindent 6 }}
{{- end }}
