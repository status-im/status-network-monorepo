{{- if and .Values.l2.enabled .Values.l2.shomeiFrontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shomei-frontend
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "shomei-frontend") | nindent 4 }}
spec:
  replicas: {{ .Values.l2.shomeiFrontend.replicas }}
  selector:
    matchLabels:
      {{- include "status-network.componentSelectorLabels" (list . "shomei-frontend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "status-network.componentSelectorLabels" (list . "shomei-frontend") | nindent 8 }}
    spec:
      initContainers:
        - name: wait-for-shomei
          image: {{ .Values.images.busybox }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for shomei..."
              until nc -z shomei {{ .Values.l2.shomei.port }}; do
                echo "shomei not ready, waiting..."
                sleep 2
              done
              echo "shomei is ready"
        {{- if not .Values.network.l1RpcEndpoint }}
        - name: wait-for-l1
          image: {{ .Values.images.busybox }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for L1 EL node..."
              until nc -z l1-el-node {{ .Values.l1.elNode.ports.http }}; do
                echo "L1 EL node not ready, waiting..."
                sleep 2
              done
              echo "L1 EL node is ready"
        {{- end }}
      containers:
        - name: shomei-frontend
          image: {{ .Values.images.shomei }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /opt/shomei/bin/shomei
            - --besu-rpc-http-host=zkbesu-shomei
            - --besu-rpc-http-port={{ .Values.l2.zkbesuShomei.ports.http }}
            - --rpc-http-host=0.0.0.0
            - --rpc-http-host-allow-list=*
            - --rpc-http-port={{ .Values.l2.shomeiFrontend.ports.http }}
            - --min-confirmations-before-importing=0
            - --trace-start-block-number=0
            - --data-path=/data/shomei
            - --metrics-http-host=0.0.0.0
            - --metrics-http-port={{ .Values.l2.shomeiFrontend.ports.metrics }}
            - --enable-trace-generation=false
          volumeMounts:
            - name: shomei-frontend-data
              mountPath: /data
          ports:
            - name: http
              containerPort: {{ .Values.l2.shomeiFrontend.ports.http }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.l2.shomeiFrontend.ports.metrics }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.l2.shomeiFrontend.resources | nindent 12 }}
      volumes:
        - name: shomei-frontend-data
          emptyDir: {}
      {{- include "status-network.nodeSelector" . | nindent 6 }}
      {{- include "status-network.tolerations" . | nindent 6 }}
      {{- include "status-network.affinity" . | nindent 6 }}
{{- end }}
