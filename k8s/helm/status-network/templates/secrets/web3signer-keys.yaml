{{- if and .Values.l2.web3signer.enabled .Values.secrets.autoGenerate }}
---
apiVersion: v1
kind: Secret
metadata:
  name: web3signer-keys
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "web3signer") | nindent 4 }}
type: Opaque
stringData:
  # Data submission key (blob submission)
  data-submission-signer.yaml: |
    type: "file-raw"
    keyType: "SECP256K1"
    # Public key: 9d9031e97dd78ff8c15aa86939de9b1e791066a0224e331bc962a2099a7b1f0464b8bbafe1535f2301c72c2cb3535b172da30b02686ab0393d348614f157fbdb
    privateKey: "0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a"
  data-submission-signer.txt: |
    password

  # Finalization key (aggregation)
  finalization-signer.yaml: |
    type: "file-raw"
    keyType: "SECP256K1"
    # Public key: ba5734d8f7091719471e7f7ed6b9df170dc70cc661ca05e688601ad984f068b0d67351e5f06073092499336ab0839ef8a521afd334e53807205fa2f08eec74f4
    privateKey: "0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d"
  finalization-signer.txt: |
    password

  # Message anchoring key
  anchoring-signer.yaml: |
    type: "file-raw"
    keyType: "SECP256K1"
    # Public key: 4a788ad6fa008beed58de6418369717d7492f37d173d70e2c26d9737e2c6eeae929452ef8602a19410844db3e200a0e73f5208fd76259a8766b73953fc3e7023
    privateKey: "0x4d01ae6487860981699236a58b68f807ee5f17b12df5740b85cf4c4653be0f55"
  anchoring-signer.txt: |
    password

  # Liveness key (sequencer liveness service)
  liveness-signer.yaml: |
    type: "file-raw"
    keyType: "SECP256K1"
    # Public key: 3aee43fafba7d1b83b23448df3c9876751feaa19b7b38be8ee6e277f2761b009737841d9a5278c8ec466655264cff58ad7921dd1687b8f5ff303e9b2fecebf30
    privateKey: "0x234d87442cf7d43841fbe280febcdfabfb646added67bc19f7e42a5483f614c4"
  liveness-signer.txt: |
    password

---
apiVersion: v1
kind: Secret
metadata:
  name: web3signer-tls
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "web3signer") | nindent 4 }}
type: Opaque
data:
  # Base64-encoded TLS keystore (from docker/web3signer/tls-files/)
  web3signer-keystore.p12: 
stringData:
  keystore-password: "changeit"
  # Known clients file for TLS client authentication
  known-clients.txt: |
    coordinator 29:E2:6D:1C:E6:E7:81:69:28:82:54:A9:CC:05:FD:F0:4E:17:40:4B:75:93:85:E2:1C:90:9E:8A:F1:6F:05:74
    sequencer 16:46:B8:9D:F7:99:2E:FC:08:B8:61:37:F0:C9:2B:1C:57:48:67:76:CC:39:96:37:99:55:8A:1C:82:A5:A7:5F

---
apiVersion: v1
kind: Secret
metadata:
  name: coordinator-tls
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "coordinator") | nindent 4 }}
type: Opaque
data:
  # Base64-encoded TLS keystores for coordinator (from config/coordinator/tls-files/)
  coordinator-client-keystore.p12: 
  web3signer-truststore.p12: 
stringData:
  keystore-password: "changeit"
  truststore-password: "changeit"
{{- end }}
