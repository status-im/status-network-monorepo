{{- if and .Values.l2.postgres.enabled .Values.secrets.autoGenerate }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "postgres") | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: "{{ .Values.l2.postgres.credentials.username }}"
  POSTGRES_PASSWORD: "{{ .Values.l2.postgres.credentials.password }}"
  # Connection strings for different databases
  POSTMAN_DATABASE_URL: "postgres://{{ .Values.l2.postgres.credentials.username }}:{{ .Values.l2.postgres.credentials.password }}@postgres:{{ .Values.l2.postgres.port }}/postman_db"
  PROVER_DATABASE_URL: "postgres://{{ .Values.l2.postgres.credentials.username }}:{{ .Values.l2.postgres.credentials.password }}@postgres:{{ .Values.l2.postgres.port }}/prover_db"
  COORDINATOR_DATABASE_URL: "postgres://{{ .Values.l2.postgres.credentials.username }}:{{ .Values.l2.postgres.credentials.password }}@postgres:{{ .Values.l2.postgres.port }}/linea_coordinator"
{{- end }}
