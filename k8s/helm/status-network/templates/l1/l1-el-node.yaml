{{- if and .Values.l1.enabled .Values.l1.elNode.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: l1-el-node
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "l1-el-node") | nindent 4 }}
spec:
  replicas: {{ .Values.l1.elNode.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "status-network.componentSelectorLabels" (list . "l1-el-node") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "status-network.componentSelectorLabels" (list . "l1-el-node") | nindent 8 }}
    spec:
      {{- if ne .Values.network.l1Network "hoodi" }}
      initContainers:
        - name: wait-for-genesis
          image: {{ .Values.images.busybox }}
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for L1 genesis files..."
              until [ -f /data/l1-node-config/genesis.json ]; do
                echo "Genesis file not ready, waiting..."
                sleep 2
              done
              echo "Genesis files are ready"
              ls -la /data/l1-node-config/
          volumeMounts:
            - name: l1-genesis-data
              mountPath: /data/l1-node-config
      {{- end }}
      containers:
        - name: besu
          image: {{ .Values.images.besu }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              {{- if eq .Values.network.l1Network "hoodi" }}
              besu --network=hoodi --config-file=/config/config.toml
              {{- else }}
              besu --config-file=/config/config.toml
              {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.l1.elNode.ports.http }}
              protocol: TCP
            - name: ws
              containerPort: {{ .Values.l1.elNode.ports.ws }}
              protocol: TCP
            - name: engine
              containerPort: {{ .Values.l1.elNode.ports.engine }}
              protocol: TCP
            - name: p2p
              containerPort: {{ .Values.l1.elNode.ports.p2p }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.l1.elNode.ports.metrics }}
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: "{{ .Values.l1.elNode.javaOpts }}"
          volumeMounts:
            - name: l1-el-config
              mountPath: /config/config.toml
              subPath: config.toml
            - name: l1-el-config
              mountPath: /config/log4j.xml
              subPath: log4j.xml
            {{- if ne .Values.network.l1Network "hoodi" }}
            - name: l1-genesis-data
              mountPath: /data/l1-node-config
            {{- end }}
            - name: l1-el-data
              mountPath: /opt/besu/data
            - name: jwt-secret
              mountPath: /config/jwtsecret.txt
              subPath: jwtsecret.txt
            - name: l1-el-keys
              mountPath: /config/keys
          livenessProbe:
            httpGet:
              path: /liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.l1.elNode.resources | nindent 12 }}
      volumes:
        - name: l1-el-config
          configMap:
            name: l1-el-config
        {{- if ne .Values.network.l1Network "hoodi" }}
        - name: l1-genesis-data
          persistentVolumeClaim:
            claimName: l1-genesis-data
        {{- end }}
        - name: l1-el-data
          persistentVolumeClaim:
            claimName: l1-el-data
        - name: jwt-secret
          secret:
            secretName: jwt-secret
        - name: l1-el-keys
          secret:
            secretName: l1-el-node-keys
      {{- include "status-network.nodeSelector" . | nindent 6 }}
      {{- include "status-network.tolerations" . | nindent 6 }}
      {{- include "status-network.affinity" . | nindent 6 }}
{{- end }}
