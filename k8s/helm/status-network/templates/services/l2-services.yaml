{{- if .Values.l2.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.l2.postgres.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "status-network.componentSelectorLabels" (list . "postgres") | nindent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: rln-prover
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "rln-prover") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: {{ .Values.l2.rlnProver.ports.grpc }}
      targetPort: grpc
      protocol: TCP
    - name: grpc-alt
      port: {{ .Values.l2.rlnProver.ports.grpcAlt }}
      targetPort: grpc-alt
      protocol: TCP
  selector:
    {{- include "status-network.componentSelectorLabels" (list . "rln-prover") | nindent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: sequencer
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "sequencer") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.l2.sequencer.ports.http }}
      targetPort: http
      protocol: TCP
    - name: ws
      port: {{ .Values.l2.sequencer.ports.ws }}
      targetPort: ws
      protocol: TCP
    - name: engine
      port: {{ .Values.l2.sequencer.ports.engine }}
      targetPort: engine
      protocol: TCP
    - name: p2p-tcp
      port: {{ .Values.l2.sequencer.ports.p2p }}
      targetPort: p2p
      protocol: TCP
    - name: p2p-udp
      port: {{ .Values.l2.sequencer.ports.p2p }}
      targetPort: p2p
      protocol: UDP
    - name: metrics
      port: {{ .Values.l2.sequencer.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "status-network.componentSelectorLabels" (list . "sequencer") | nindent 4 }}

