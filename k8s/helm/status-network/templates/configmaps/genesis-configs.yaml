  genesis-maru.json.template: |
    {
      "chainId": {{ .Values.network.l2ChainId }},
      "config": {
        "0": {
          "type": "qbft",
          "blockTimeSeconds": 2,
          "validatorSet": ["0x083e11f14b68d5ebeb4be3e3e0237ebbc5675ab5"],
          "elFork": "Prague"
        },
        "%FORK_TIME%": {
          "type": "qbft",
          "validatorSet": ["0x083e11f14b68d5ebeb4be3e3e0237ebbc5675ab5"],
          "blockTimeSeconds": 2,
          "elFork": "Osaka"
        }
      }
    }

  init.sh: |
    #!/bin/sh
    echo "Initialization of timestamp in genesis files for Maru, Besu, and config file for coordinator"
    date
    cd /initialization || exit

    cp "genesis-maru.json.template" "genesis-maru.json"
    cp "genesis-besu.json.template" "genesis-besu.json"
    cp "/coordinator/coordinator-config-v2.toml" "coordinator-config-v2-hardforks.toml"

    fork_timestamp=$(($(date +%s) + {{ .Values.network.forkOffsetSeconds }}))
    echo "Fork Timestamp: $fork_timestamp"
    sed -i "s/%FORK_TIME%/$fork_timestamp/g" genesis-maru.json
    sed -i "s/%FORK_TIME%/$fork_timestamp/g" genesis-besu.json

    sed -i "s/^\(timestamp-based-hard-forks[ ]*=[ ]*\).*/\1[${fork_timestamp}]/" coordinator-config-v2-hardforks.toml

    echo "Genesis initialization complete"
{{- end }}
