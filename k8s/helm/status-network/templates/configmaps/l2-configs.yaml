apiVersion: v1
kind: ConfigMap
metadata:
  name: traces-node-config
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "traces-node") | nindent 4 }}
data:
  traces-node-config.toml: |
    data-path="/opt/besu/data"
    host-allowlist=["*"]
    sync-mode="SNAP"
    p2p-port={{ .Values.l2.tracesNode.ports.p2p }}

    min-gas-price=0

    # engine
    engine-host-allowlist=["*"]
    engine-rpc-port={{ .Values.l2.tracesNode.ports.engine }}
    engine-jwt-disabled=true

    # rpc
    rpc-http-enabled=true
    rpc-http-host="0.0.0.0"
    rpc-http-port={{ .Values.l2.tracesNode.ports.http }}
    rpc-http-cors-origins=["*"]
    rpc-http-api=["ADMIN","DEBUG","NET","ETH","ENGINE","WEB3","PLUGINS","MINER","LINEA"]
    rpc-http-max-active-connections=200

    # ws
    rpc-ws-enabled=true
    rpc-ws-host="0.0.0.0"
    rpc-ws-port={{ .Values.l2.tracesNode.ports.ws }}
    rpc-ws-api=["ADMIN","TXPOOL","WEB3","ETH","NET","PERM"]
    rpc-ws-max-active-connections=200

    # graphql
    graphql-http-enabled=false

    # metrics
    metrics-enabled=true
    metrics-host="0.0.0.0"
    metrics-port=9545

    # database
    data-storage-format="BONSAI"

    # plugins - TRACER plugins, NOT sequencer plugins!
    plugins=["TracerReadinessPlugin","TracesEndpointServicePlugin","LineCountsEndpointServicePlugin","CaptureEndpointServicePlugin"]
    plugin-linea-conflated-trace-generation-traces-output-path="/opt/besu/data/traces/v2/conflated"
    plugin-linea-rpc-concurrent-requests-limit=2
    plugin-linea-tracer-readiness-server-host="0.0.0.0"
    plugin-linea-tracer-readiness-server-port=8548
    plugin-linea-tracer-readiness-max-blocks-behind=5
    plugin-linea-l1l2-bridge-contract="{{ .Values.network.contracts.l2MessageService }}"
    plugin-linea-l1l2-bridge-topic="e856c2b8bd4eb0027ce32eeaf595c21b0b6b4644b326e5b7bd80a1cf8db72e6c"
    plugin-linea-limitless-enabled=false

    cache-last-block-headers-preload-enabled=true
    cache-last-block-headers=50

    # Prune old trie logs to bound storage growth (~50GB target)
    bonsai-limit-trie-logs-enabled=true
    bonsai-trie-logs-pruning-window-size=5120
    bonsai-historical-block-limit=512
    bonsai-parallel-tx-processing-enabled=false

  log4j.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <Configuration status="INFO" monitorInterval="30">
      <Properties>
        <Property name="root.log.level">INFO</Property>
      </Properties>
      <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
          <PatternLayout pattern="%d{yyyy-MM-dd HH:mm:ss.SSSZZZ} | %t | %-5level | %c{1} | %msg%n"/>
        </Console>
      </Appenders>
      <Loggers>
        <Root level="${sys:root.log.level}">
          <AppenderRef ref="Console"/>
        </Root>
      </Loggers>
    </Configuration>

  deny-list.txt: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zkbesu-shomei-config
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "zkbesu-shomei") | nindent 4 }}
data:
  zkbesu-config.toml: |
    data-path="/opt/besu/data"
    host-allowlist=["*"]
    sync-mode="FULL"
    p2p-port={{ .Values.l2.zkbesuShomei.ports.p2p }}

    min-gas-price=0

    # engine
    engine-host-allowlist=["*"]
    engine-rpc-port={{ .Values.l2.zkbesuShomei.ports.engine }}
    engine-jwt-disabled=true

    # rpc
    rpc-http-enabled=true
    rpc-http-host="0.0.0.0"
    rpc-http-port={{ .Values.l2.zkbesuShomei.ports.http }}
    rpc-http-cors-origins=["*"]
    rpc-http-api=["ADMIN","DEBUG","NET","ETH","ENGINE","WEB3","PLUGINS","MINER","SHOMEI"]
    rpc-http-max-active-connections=200

    # ws
    rpc-ws-enabled=true
    rpc-ws-host="0.0.0.0"
    rpc-ws-port={{ .Values.l2.zkbesuShomei.ports.ws }}
    rpc-ws-api=["ADMIN","TXPOOL","WEB3","ETH","NET","PERM"]
    rpc-ws-max-active-connections=200

    # graphql
    graphql-http-enabled=false

    # metrics
    metrics-enabled=true
    metrics-host="0.0.0.0"
    metrics-port=9545

    # database
    data-storage-format="BONSAI"

    # plugins - only Shomei plugins for zkbesu-shomei node
    plugins=["BesuShomeiRpcPlugin", "ZkTrieLogPlugin"]

    cache-last-block-headers-preload-enabled=true
    cache-last-block-headers=50

    bonsai-limit-trie-logs-enabled=false
    bonsai-parallel-tx-processing-enabled=false

  log4j.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <Configuration status="INFO" monitorInterval="30">
      <Properties>
        <Property name="root.log.level">INFO</Property>
      </Properties>
      <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
          <PatternLayout pattern="%d{yyyy-MM-dd HH:mm:ss.SSSZZZ} | %t | %-5level | %c{1} | %msg%n"/>
        </Console>
      </Appenders>
      <Loggers>
        <Root level="${sys:root.log.level}">
          <AppenderRef ref="Console"/>
        </Root>
      </Loggers>
    </Configuration>

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: maru-config
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "maru") | nindent 4 }}
data:
  sequencer.config.toml: |
    allow-empty-blocks = true

    [linea]
    contract-address = "{{ .Values.network.contracts.l1Rollup }}"
    l1-eth-api = { endpoint = "{{ include "status-network.l1RpcEndpoint" . }}" }
    l1-polling-interval = "1 seconds"
    l2-eth-api-endpoint = { endpoint = "http://sequencer:{{ .Values.l2.sequencer.ports.http }}" }

    [persistence]
    data-path="/tmp/maru-db"
    private-key-path="/tmp/maru-db/private-key"

    [qbft]
    fee-recipient = "0x0000000000000000000000000000000000000000"

    [p2p]
    port = 9000
    ip-address = "0.0.0.0"
    static-peers = []
    reconnect-delay = "500 ms"

    [p2p.discovery]
    port = 9000
    refresh-interval = "2 seconds"

    [p2p.reputation]
    cooldown-period = "2 seconds"
    ban-period = "30 seconds"

    [payload-validator]
    engine-api-endpoint = { endpoint = "http://sequencer:{{ .Values.l2.sequencer.ports.engine }}" }
    eth-api-endpoint = { endpoint = "http://sequencer:{{ .Values.l2.sequencer.ports.http }}" }
    payload-validation-enabled = true

    [follower-engine-apis]
    follower-besu = { endpoint = "http://l2-node-besu:{{ .Values.l2.l2NodeBesu.ports.engine }}" }
    follower-tracer = { endpoint = "http://traces-node:{{ .Values.l2.tracesNode.ports.engine }}" }
    follower-shomei = { endpoint = "http://zkbesu-shomei:{{ .Values.l2.zkbesuShomei.ports.engine }}" }

    [fork-transition]
    l2-eth-api-endpoint = { endpoint = "http://sequencer:{{ .Values.l2.sequencer.ports.http }}" }

    [observability]
    port = 9090
    jvm-metrics-enabled = true
    prometheus-metrics-enabled = true

    [api]
    port = {{ .Values.l2.maru.ports.api }}

    [syncing]
    peer-chain-height-polling-interval = "1 seconds"
    el-sync-status-refresh-interval = "1 seconds"
    use-unconditional-random-download-peer = false
    sync-target-selection = "Highest"

  log4j.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <Configuration status="INFO" monitorInterval="30">
      <Properties>
        <Property name="root.log.level">INFO</Property>
      </Properties>
      <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
          <PatternLayout pattern="%d{yyyy-MM-dd HH:mm:ss.SSSZZZ} | %t | %-5level | %c{1} | %msg%n"/>
        </Console>
      </Appenders>
      <Loggers>
        <Root level="${sys:root.log.level}">
          <AppenderRef ref="Console"/>
        </Root>
      </Loggers>
    </Configuration>

