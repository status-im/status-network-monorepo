{{- if .Values.l2.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sequencer-config
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "sequencer") | nindent 4 }}
data:
  sequencer.config.toml: |
    genesis-file="/initialization/genesis-besu.json"
    #logging="DEBUG" log is managed via log4j config file
    data-path="/opt/besu/data"
    data-storage-format="FOREST"
    sync-mode="FULL"
    host-allowlist=["*"]
    revert-reason-enabled=true

    target-gas-limit=2000000000
    min-gas-price=0
    tx-pool-min-gas-price=0
    max-peers=10
    p2p-port={{ .Values.l2.sequencer.ports.p2p }}

    # engine
    engine-host-allowlist=["*"]
    engine-rpc-port={{ .Values.l2.sequencer.ports.engine }}
    engine-jwt-disabled=true

    # rpc
    rpc-http-enabled=true
    rpc-http-host="0.0.0.0"
    rpc-http-port={{ .Values.l2.sequencer.ports.http }}
    rpc-http-api=["ADMIN","DEBUG","NET","ETH","ENGINE","CLIQUE","MINER","WEB3","TRACE","LINEA"]
    rpc-http-cors-origins=["*"]
    rpc-http-max-active-connections=20000

    # ws
    rpc-ws-enabled=true
    rpc-ws-host="0.0.0.0"
    rpc-ws-port={{ .Values.l2.sequencer.ports.ws }}
    rpc-ws-api=["ADMIN","DEBUG","NET","ETH","CLIQUE","MINER","WEB3","TRACE","LINEA"]
    rpc-ws-max-active-connections=200

    # graphql
    graphql-http-enabled=false

    # metrics
    metrics-enabled=true
    metrics-host="0.0.0.0"
    metrics-port={{ .Values.l2.sequencer.ports.metrics }}

    tx-pool-no-local-priority=true
    poa-block-txs-selection-max-time=80

    # plugins - full set matching docker
    plugins=["LineaEstimateGasEndpointPlugin","LineaExtraDataPlugin","LineaTransactionPoolValidatorPlugin","LineaBundleEndpointsPlugin","LineaSetExtraDataEndpointPlugin","LineaTransactionSelectorPlugin"]
    plugin-linea-module-limit-file-path="/var/lib/besu/traces-limits.toml"
    plugin-linea-deny-list-path="/var/lib/besu/deny-list.txt"
    plugin-linea-estimate-gas-compatibility-mode-enabled=false
    plugin-linea-extra-data-pricing-enabled=true
    plugin-linea-l1l2-bridge-contract="{{ .Values.network.contracts.l2MessageService }}"
    plugin-linea-l1l2-bridge-topic="e856c2b8bd4eb0027ce32eeaf595c21b0b6b4644b326e5b7bd80a1cf8db72e6c"
    plugin-linea-tx-pool-profitability-check-api-enabled=false
    plugin-linea-tx-pool-profitability-check-p2p-enabled=false
    plugin-linea-tx-pool-simulation-check-api-enabled=false
    plugin-linea-tx-pool-simulation-check-p2p-enabled=false
    plugin-linea-max-block-calldata-size=109000
    plugin-linea-max-tx-calldata-size=60000
    plugin-linea-max-block-gas=55000000
    plugin-linea-tx-pool-min-margin="0.8"
    plugin-linea-min-margin="1.0"
    plugin-linea-fixed-gas-cost-wei=30000000
    plugin-linea-variable-gas-cost-wei=1000000000
    plugin-linea-extra-data-set-min-gas-price-enabled=false
    plugin-linea-estimate-gas-min-margin="1.2"
    plugin-linea-limitless-enabled=false
    strict-tx-replay-protection-enabled=false

    Xplugin-rocksdb-high-spec-enabled=true
    Xsynchronizer-fast-sync-full-validation-rate=0.000001
    tx-pool-priority-senders=["0xfe3b557e8fb62b89f4916b721be55ceb828dbd73",
      "0xd42e308fc964b71e18126df469c21b0d7bcb86cc",
      "0x1b9abeec3215d8ade8a33607f2cf0f4f60e5f0d0",
      "0xc8c92fe825d8930b9357c006e0af160dfa727a62"]

    Xin-process-rpc-enabled=true
    Xin-process-rpc-apis=["ETH", "MINER"]

  log4j.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <Configuration status="DEBUG" monitorInterval="30">
      <Properties>
        <Property name="root.log.level">DEBUG</Property>
      </Properties>
      <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
          <PatternLayout pattern="%d{yyyy-MM-dd HH:mm:ss.SSSZZZ} | %t | %-5level | %c{1} | %msg %throwable%n"/>
        </Console>
      </Appenders>
      <Loggers>
        <Logger name="net.consensys.linea" level="DEBUG"/>
        <Root level="${sys:root.log.level}">
          <AppenderRef ref="Console"/>
        </Root>
      </Loggers>
    </Configuration>

  deny-list.txt: ""
  gasless-deny-list.txt: ""
  moduleLimitFile.toml: |
    [traces-limits]
    # Module limits of the beta-v4.4 release (Osaka)
    #
    # Arithmetization module limits
    #
    ADD                 = 262144
    BIN                 = 262144
    BLAKE_MODEXP_DATA   = 16384
    BLOCK_DATA          = 4096
    BLOCK_HASH          = 2560
    BLS_DATA            = 65536
    EC_DATA             = 65536
    EUC                 = 65536
    EXP                 = 65536
    EXT                 = 524288
    GAS                 = 65536
    HUB                 = 2097152
    LOG_DATA            = 65536
    LOG_INFO            = 4096
    MMIO                = 2097152
    MMU                 = 1048576
    MOD                 = 131072
    MUL                 = 65536
    MXP                 = 524288
    OOB                 = 262144
    RLP_ADDR            = 4096
    RLP_TXN             = 131072
    RLP_TXN_RCPT        = 65536
    RLP_UTILS           = 131072
    ROM                 = 8388608
    ROM_LEX             = 1024
    SHAKIRA_DATA        = 65536
    SHF                 = 262144
    STP                 = 16384
    TRM                 = 32768
    TXN_DATA            = 8192
    WCP                 = 262144
    #
    # Precompiles limits
    #
    PRECOMPILE_ECRECOVER_EFFECTIVE_CALLS        = 128
    PRECOMPILE_SHA2_BLOCKS                      = 200
    PRECOMPILE_RIPEMD_BLOCKS                    = 0
    PRECOMPILE_MODEXP_EFFECTIVE_CALLS           = 32
    PRECOMPILE_LARGE_MODEXP_EFFECTIVE_CALLS     = 1
    PRECOMPILE_ECADD_EFFECTIVE_CALLS            = 256
    PRECOMPILE_ECMUL_EFFECTIVE_CALLS            = 40
    PRECOMPILE_ECPAIRING_FINAL_EXPONENTIATIONS  = 16
    PRECOMPILE_ECPAIRING_G2_MEMBERSHIP_CALLS    = 64
    PRECOMPILE_ECPAIRING_MILLER_LOOPS           = 64
    PRECOMPILE_BLAKE_EFFECTIVE_CALLS            = 0
    PRECOMPILE_BLAKE_ROUNDS                     = 0
    # Precompiles introduced from beta-v4.0-rc6-CANCUN
    PRECOMPILE_BLS_POINT_EVALUATION_EFFECTIVE_CALLS     = 1
    PRECOMPILE_POINT_EVALUATION_FAILURE_EFFECTIVE_CALLS = 2
    PRECOMPILE_BLS_G1_ADD_EFFECTIVE_CALLS               = 8
    PRECOMPILE_BLS_G1_MSM_EFFECTIVE_CALLS               = 4
    PRECOMPILE_BLS_G2_ADD_EFFECTIVE_CALLS               = 8
    PRECOMPILE_BLS_G2_MSM_EFFECTIVE_CALLS               = 4
    PRECOMPILE_BLS_PAIRING_CHECK_MILLER_LOOPS           = 8
    PRECOMPILE_BLS_FINAL_EXPONENTIATIONS                = 2
    PRECOMPILE_BLS_MAP_FP_TO_G1_EFFECTIVE_CALLS         = 4
    PRECOMPILE_BLS_MAP_FP2_TO_G2_EFFECTIVE_CALLS        = 4
    PRECOMPILE_BLS_C1_MEMBERSHIP_CALLS                  = 8
    PRECOMPILE_BLS_C2_MEMBERSHIP_CALLS                  = 8
    PRECOMPILE_BLS_G1_MEMBERSHIP_CALLS                  = 8
    PRECOMPILE_BLS_G2_MEMBERSHIP_CALLS                  = 8
    # Precompiles introduced from beta-v4.4
    PRECOMPILE_P256_VERIFY_EFFECTIVE_CALLS              = 128
    #
    # Block-specific limits
    #
    BLOCK_KECCAK        = 8192
    BLOCK_L1_SIZE       = 1000000
    BLOCK_L2_L1_LOGS    = 16
    BLOCK_TRANSACTIONS  = 300
  traces-limits.toml: |
    [traces-limits]
    # Module limits of the beta-v4.4 release (Osaka)
    #
