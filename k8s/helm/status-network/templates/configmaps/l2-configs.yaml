apiVersion: v1
kind: ConfigMap
metadata:
  name: l2-node-besu-config
  namespace: {{ include "status-network.namespace" . }}
  labels:
    {{- include "status-network.componentLabels" (list . "l2-node-besu") | nindent 4 }}
data:
  l2-node-besu-config.toml: |
    data-path="/opt/besu/data"
    host-allowlist=["*"]
    sync-mode="FULL"
    p2p-port={{ .Values.l2.l2NodeBesu.ports.p2p }}

    min-gas-price=0
    tx-pool-min-gas-price=0

    # engine
    engine-host-allowlist=["*"]
    engine-rpc-port={{ .Values.l2.l2NodeBesu.ports.engine }}
    engine-jwt-disabled=true

    # rpc
    rpc-http-enabled=true
    rpc-http-host="0.0.0.0"
    rpc-http-port={{ .Values.l2.l2NodeBesu.ports.http }}
    rpc-http-cors-origins=["*"]
    rpc-http-api=["ADMIN","DEBUG","NET","ETH","ENGINE","WEB3","PLUGINS","LINEA","TXPOOL"]
    rpc-http-max-active-connections=200

    # ws
    rpc-ws-enabled=true
    rpc-ws-host="0.0.0.0"
    rpc-ws-port={{ .Values.l2.l2NodeBesu.ports.ws }}
    rpc-ws-api=["ADMIN","TXPOOL","WEB3","ETH","NET","PERM","LINEA"]
    rpc-ws-max-active-connections=200

    # graphql
    graphql-http-enabled=false

    # metrics
    metrics-enabled=true
    metrics-host="0.0.0.0"
    metrics-port=9545

    # database
    data-storage-format="BONSAI"

    # plugins
    plugins=["LineaEstimateGasEndpointPlugin","LineaExtraDataPlugin","LineaTransactionPoolValidatorPlugin","LineaBundleEndpointsPlugin","LineaSetExtraDataEndpointPlugin","LineaTransactionSelectorPlugin"]
    plugin-linea-module-limit-file-path="/var/lib/besu/traces-limits.toml"
    plugin-linea-deny-list-path="/var/lib/besu/deny-list.txt"
    plugin-linea-l1l2-bridge-contract="{{ .Values.network.contracts.l2MessageService }}"
    plugin-linea-l1l2-bridge-topic="e856c2b8bd4eb0027ce32eeaf595c21b0b6b4644b326e5b7bd80a1cf8db72e6c"
    plugin-linea-tx-pool-profitability-check-p2p-enabled=false
    plugin-linea-tx-pool-profitability-check-api-enabled=false
    plugin-linea-tx-pool-simulation-check-api-enabled=false
    plugin-linea-tx-pool-simulation-check-p2p-enabled=false
    plugin-linea-extra-data-pricing-enabled=false
    plugin-linea-max-tx-calldata-size=30000
    plugin-linea-tx-pool-min-margin="0"
    plugin-linea-min-margin="0"
    plugin-linea-fixed-gas-cost-wei=0
    plugin-linea-variable-gas-cost-wei=0
    plugin-linea-extra-data-set-min-gas-price-enabled=false
    plugin-linea-estimate-gas-compatibility-mode-enabled=false
    plugin-linea-estimate-gas-min-margin="1.2"
    plugin-linea-limitless-enabled=false

    Xin-process-rpc-enabled=true
    Xin-process-rpc-apis=["ETH", "MINER"]

    cache-last-block-headers-preload-enabled=true
    cache-last-block-headers=50

    bonsai-limit-trie-logs-enabled=false
    bonsai-historical-block-limit=1024
    bonsai-parallel-tx-processing-enabled=false

  log4j.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <Configuration status="INFO" monitorInterval="30">
      <Properties>
        <Property name="root.log.level">INFO</Property>
      </Properties>
      <Appenders>
        <Console name="Console" target="SYSTEM_OUT">
          <PatternLayout pattern="%d{yyyy-MM-dd HH:mm:ss.SSSZZZ} | %t | %-5level | %c{1} | %msg%n"/>
        </Console>
      </Appenders>
      <Loggers>
        <Root level="${sys:root.log.level}">
          <AppenderRef ref="Console"/>
        </Root>
      </Loggers>
    </Configuration>

  deny-list.txt: ""

  traces-limits.toml: |
    [traces-limits]
    # Module limits of the beta-v4.4 release (Osaka)
    #
    # Arithmetication module limits
    #
    ADD                 = 262144
    BIN                 = 262144
    BLAKE_MODEXP_DATA   = 16384
    BLOCK_DATA          = 4096
    BLOCK_HASH          = 2560
    BLS_DATA            = 65536
    EC_DATA             = 65536
    EUC                 = 65536
    EXP                 = 65536
    EXT                 = 524288
    GAS                 = 65536
    HUB                 = 2097152
    LOG_DATA            = 65536
    LOG_INFO            = 4096
    MMIO                = 2097152
    MMU                 = 1048576
    MOD                 = 131072
    MUL                 = 65536
    MXP                 = 524288
    OOB                 = 262144
    RLP_ADDR            = 4096
    RLP_TXN             = 131072
    RLP_TXN_RCPT        = 65536
    RLP_UTILS           = 131072
    ROM                 = 8388608
    ROM_LEX             = 1024
    SHAKIRA_DATA        = 65536
    SHF                 = 262144
    STP                 = 16384
    TRM                 = 32768
    TXN_DATA            = 8192
    WCP                 = 262144
    #
    # Precompiles limits
    #
    PRECOMPILE_ECRECOVER_EFFECTIVE_CALLS        = 128
    PRECOMPILE_SHA2_BLOCKS                      = 200
    PRECOMPILE_RIPEMD_BLOCKS                    = 0
    PRECOMPILE_MODEXP_EFFECTIVE_CALLS           = 32
    PRECOMPILE_LARGE_MODEXP_EFFECTIVE_CALLS     = 1
    PRECOMPILE_ECADD_EFFECTIVE_CALLS            = 256
