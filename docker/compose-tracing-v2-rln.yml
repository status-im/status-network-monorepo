volumes:
  local-dev:
    name: "linea-local-dev"
  logs:
    name: "linea-logs"
  rln-data:
    name: "rln-data"
  gas-kill-switch:

networks:
  linea:
    driver: bridge
    ipam:
      config:
        - subnet: 11.11.11.0/24
  l1network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

# To debug inside the network and volumes
# docker run --rm -it --network=docker_linea -v=linea-local-dev:/data -v=linea-logs:/logs weibeld/ubuntu-networking bash

services:
  l1-el-node:
    extends:
      file: compose-spec-l1-services.yml
      service: l1-el-node

  l1-cl-node:
    extends:
      file: compose-spec-l1-services.yml
      service: l1-cl-node

  l1-node-genesis-generator:
    extends:
      file: compose-spec-l1-services.yml
      service: l1-node-genesis-generator

  l2-genesis-initialization:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: l2-genesis-initialization

  # MARU consensus client for block production
  maru:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: maru

  # RLN-enabled sequencer using our custom Besu image
  sequencer:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: sequencer

  # RLN Prover service (also handles karma/quota management)
  rln-prover:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: rln-prover

  # RPC node with gRPC transaction validator
  l2-node-besu:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: l2-node-besu

  # Follower RPC node for redundancy
  l2-node-besu-follower:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: l2-node-besu-follower

  traces-node:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: traces-node

  prover-v3:
    extends:
      file: compose-spec-l2-services.yml
      service: prover-v3
    volumes:
      - ../tmp/local/:/data/
      - logs:/logs
      - ./config/prover/v3/prover-config.toml:/opt/linea/prover/config.toml:ro
      - ../prover/prover-assets:/opt/linea/prover/prover-assets:ro

  coordinator:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: coordinator

  web3signer:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: web3signer

  postgres:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: postgres

  postgres-replica:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: postgres-replica

  zkbesu-shomei:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: zkbesu-shomei

  shomei:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: shomei

  transaction-exclusion-api:
    extends:
      file: compose-spec-l2-services-rln.yml
      service: transaction-exclusion-api
