name: linea-sequencer-plugin-testing

permissions:
  contents: read
  actions: read

on:
  workflow_call:

concurrency:
  group: linea-sequencer-plugin-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run-linea-sequencer-plugins-unit-tests:
    name: "Linea Sequencer Plugin Unit Tests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@8df1039502a15bceb9433410b1a100fbe190c53b #v4.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@8379f6a1328ee0e06e2bb424dadb7b159856a326 # 4.4.0

      - name: spotless
        run: ./gradlew --parallel besu-plugins:linea-sequencer:spotlessCheck

      - name: Build
        run: ./gradlew besu-plugins:linea-sequencer:build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: besu-plugins/linea-sequencer/sequencer/build/libs

      - name: Run unit tests
        run: ./gradlew besu-plugins:linea-sequencer:sequencer:test --continue || true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: besu-plugins/linea-sequencer/sequencer/build/reports/tests/test/

# NOTE: Acceptance tests are disabled on CI due to resource constraints.
# They pass locally but fail on GitHub-hosted runners.
# Run acceptance tests locally: ./gradlew besu-plugins:linea-sequencer:acceptance-tests:acceptanceTests
