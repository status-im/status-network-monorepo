name: sequencer-tests

on:
  pull_request:
    paths:
      - 'besu-plugins/linea-sequencer/**'
      - '.github/workflows/sequencer-tests.yml'
  push:
    branches:
      - main
      - develop
    paths:
      - 'besu-plugins/linea-sequencer/**'
      - '.github/workflows/sequencer-tests.yml'

permissions:
  contents: read
  actions: read

jobs:
  unit:
    name: Sequencer Unit Tests (JDK 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: gradle/actions/wrapper-validation@ac638b010cf58a27ee6c972d7336334ccaf61c96

      # Installs Go 1.24.6, Java 25, Gradle, and runs
      # `./gradlew buildAndUpdateBesuVersionInLibsVersions` which re-syncs the
      # `besu` field in gradle/libs.versions.toml with `besuCommit`. Our
      # pre-commit hook reverts manual `besu` edits, so this CI step is the
      # canonical place for that sync to happen.
      - name: Setup Tracer Environment
        uses: ./.github/actions/setup-tracer-environment

      - name: Spotless check
        run: ./gradlew --no-daemon --parallel clean besu-plugins:linea-sequencer:spotlessCheck

      - name: Build
        run: ./gradlew besu-plugins:linea-sequencer:build
        env:
          JAVA_OPTS: -Xmx2g -Dorg.gradle.daemon=false

      - name: Run unit tests (sequencer packages only)
        run: ./gradlew besu-plugins:linea-sequencer:sequencer:test --tests 'net.consensys.linea.sequencer.*'
        env:
          JAVA_OPTS: -Dorg.gradle.daemon=false

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sequencer-unit-test-report
          path: besu-plugins/linea-sequencer/sequencer/build/reports/tests/test/


