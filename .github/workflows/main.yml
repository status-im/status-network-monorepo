name: main

on:
  pull_request:
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  actions: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      linea-sequencer: ${{ steps.filter.outputs.linea-sequencer }}
      status-network-contracts: ${{ steps.filter.outputs.status-network-contracts }}
      rln-prover: ${{ steps.filter.outputs.rln-prover }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            linea-sequencer:
              - 'besu-plugins/linea-sequencer/**'
              - '.github/workflows/linea-sequencer-plugin-testing.yml'
              - '.github/workflows/sequencer-tests.yml'
            status-network-contracts:
              - 'status-network-contracts/**'
              - '.github/workflows/status-network-ci.yml'
            rln-prover:
              - 'rln-prover/**'
              - '.github/workflows/rln-prover-tests.yml'

  sequencer-plugin-testing:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.linea-sequencer == 'true' }}
    uses: ./.github/workflows/linea-sequencer-plugin-testing.yml
    secrets: inherit

  status-network-contracts-ci:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.status-network-contracts == 'true' }}
    uses: ./.github/workflows/status-network-ci.yml
    secrets: inherit

  rln-prover-tests:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.rln-prover == 'true' }}
    uses: ./.github/workflows/rln-prover-tests.yml
    secrets: inherit