syntax = "proto3";
package prover;

import "google/protobuf/descriptor.proto";

service RlnAggregator {

  // Server side streaming RPC: 1 request -> X responses (stream)
  rpc GetProofs(RlnAggFilter) returns (stream RlnAggLightProofReply);
}

message RlnAggFilter {
  optional string address = 1;
}

message RlnAggProofReply {
  oneof resp {
    // variant for success
    RlnAggProof proof = 1;
    // variant for error
    RlnAggProofError error = 2;
  }
}

message RlnAggProof {
  // From https://rfc.vac.dev/vac/32/rln-v1#sending-the-output-message
  bytes sender = 1;
  bytes tx_hash = 2;              // Transaction hash for the proof (non hash signal)
  bytes proof = 3;                // The RLN proof itself, hex encoded
  uint64 epoch = 4;
}

message RlnAggProofError {
  string error = 2;
}

message RlnAggLightProofReply {
  bytes sender = 1;             // Address (20 bytes)
  bytes proof_x = 2;            // Fr (32 bytes)
  bytes proof_y = 3;            // Fr
  bytes external_nullifier = 4; // Fr
  uint64 epoch = 5;    // 8 bytes - Total: 20 + 3*32 + 8 => 124 bytes (RlnAggProof => 20 + 32 + 288 + 8 = 348 bytes)
}